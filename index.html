<!DOCTYPE html>
<html lang="en" class="lenis">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,minimal-ui">
  <title>Immersive Garden</title>
  <meta name="description" content="Immersive Garden, Innovative digital experience studio.">
  <meta name="author" content="Immersive Garden">
  <meta name="theme-color" content="#ffffff">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text x='0' y='14' font-size='16'>🌱</text></svg>">
  <style>
    @font-face{font-family:PSTimes;font-style:normal;font-weight:400;src:url(https://immersive-g.com/assets/PSTimes-Regular.hY69LrJ0.woff2) format("woff2")}
    @font-face{font-family:HelveticaNeueRegular;font-style:normal;font-weight:400;src:url(https://immersive-g.com/assets/HelveticaNeue-Regular.XE2tdPOO.woff2) format("woff2")}
    @font-face{font-family:HelveticaNeueLight;font-style:normal;font-weight:400;src:url(https://immersive-g.com/assets/HelveticaNeue-Light.DlSTh50s.woff2) format("woff2")}
    *,:after,:before{box-sizing:border-box;margin:0;padding:0;border:0;outline:none;-webkit-tap-highlight-color:transparent}
    html{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;-moz-user-select:none;-webkit-user-select:none;user-select:none}
    body{height:100%;overflow:hidden;font-family:HelveticaNeueRegular,Helvetica,Arial,sans-serif;color:#030303;background:#e8e8e8;-ms-overflow-style:none;scrollbar-width:none}
    html.lenis{height:auto}.lenis.lenis-smooth{scroll-behavior:auto}.lenis.lenis-stopped{overflow:hidden;padding-right:var(--scrollbar-width,0)}
    ::-webkit-scrollbar{display:none}*{-ms-overflow-style:none;scrollbar-width:none}
    a{text-decoration:none;color:inherit}button{background:none;cursor:pointer;border:none}
    img,video{display:block;max-width:100%;pointer-events:none;user-select:none}

    /* === WebGL Canvas === */
    #webgl-canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none}

    /* === Logo === */
    .logo{position:fixed;top:48px;left:48px;z-index:50}
    .logo svg{width:170px;height:22px;display:block}
    .logo svg path{fill:#030303}
    @media(max-width:768px){.logo{top:24px;left:24px}.logo svg{width:130px}}

    /* === Sound Toggle === */
    .soundWrapper{position:fixed;bottom:40px;right:40px;z-index:100001;pointer-events:none}
    .soundWrapper>*{pointer-events:auto}
    @media(max-width:768px){.soundWrapper{right:32px;bottom:32px}}
    .sound{--c:#030303;cursor:pointer;display:flex;align-items:center;user-select:none}
    .sound .text{color:var(--c);font-family:HelveticaNeueRegular,sans-serif;font-size:14px;line-height:1.1;margin-right:30px}
    .sound .wrapper{position:relative}
    .sound .text__off{opacity:1;position:absolute;right:-6px}
    .sound .text__on{opacity:0;position:relative}
    .sound--muted .text__off{opacity:0}
    .sound--muted .text__on{opacity:1}
    .sound .icon{position:absolute;right:-13px;height:30px;width:30px}
    .sound .icon circle{stroke:var(--c);stroke-dasharray:81.68;stroke-dashoffset:81.68;transition:stroke-dashoffset 1.2s ease,opacity 0.5s}
    .sound .icon .dot{display:flex;align-items:center;justify-content:center;height:30px;width:30px;position:absolute}
    .sound .icon .dot__child{background:var(--c);border-radius:100%;height:3px;width:3px}
    .sound--playing .icon circle{stroke-dashoffset:0;opacity:1}
    .sound--dark-bg{--c:#e8e8e8}

    /* === Intro Loader === */
    .introLoader{position:fixed;top:0;left:0;width:100%;height:100vh;z-index:1010;color:#e8e8e8;pointer-events:none;transition:opacity 1.5s ease}
    .introLoader.hidden{opacity:0;pointer-events:none}
    .introLoader .bg{background:#030303;position:absolute;top:0;left:0;width:100%;height:100%}
    .introLoader .wrapper{display:flex;align-items:center;height:100%;padding:0 48px}
    .introLoader .text{font-family:PSTimes,serif;font-size:58.52px;line-height:1.1;letter-spacing:-0.01em}
    .introLoader .text>div{padding-top:0.1em;opacity:0;transform:translateY(30px);animation:fadeUp 0.8s ease forwards}
    .introLoader .text>div:nth-child(1){animation-delay:0.4s}
    .introLoader .text>div:nth-child(2){animation-delay:0.7s}
    .introLoader .text>div:nth-child(3){animation-delay:1.0s}
    .introLoader .text>div:nth-child(4){animation-delay:1.3s}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
    @media(max-width:1113px){.introLoader .text{font-size:34px}}
    @media(max-width:560px){.introLoader .wrapper{padding:0 24px}}

    /* === Page Container === */
    .page{height:100%;left:0;overflow:auto;position:absolute;top:0;width:100%;pointer-events:auto}
    .page.hidden{opacity:0;pointer-events:none}

    /* === Hero === */
    .hero{height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 48px 239.4px;position:relative;pointer-events:none;user-select:none}
    .hero h1{font-family:PSTimes,serif;font-size:58.52px;font-weight:400;line-height:1.1;letter-spacing:-0.01em;color:#030303}
    .scroll-indication{text-align:right;align-self:flex-end;margin-top:40px;color:rgba(3,3,3,0.3);opacity:0;animation:fadeIn 1s ease 3.5s forwards;font-size:14px;line-height:1.1}
    @keyframes fadeIn{to{opacity:1}}
    @media(max-width:1113px){.hero h1{font-size:34px}}
    @media(max-width:432px){.hero{padding:0 24px 54px}}

    /* === Showreel === */
    .showreel-section{padding:0 48px;margin:40px 0}
    .showreel-section video{width:100%;height:auto;border-radius:4px;background:rgba(3,3,3,0.02)}
    .showreel-section .label{margin-top:16px;font-size:14px;color:rgba(3,3,3,0.25);font-family:HelveticaNeueRegular,sans-serif}
    @media(max-width:768px){.showreel-section{padding:0 24px}}

    /* === Text Sections === */
    .text-section{padding:0 48px;margin:80px 0 120px;display:grid;grid-template-columns:repeat(12,1fr);grid-column-gap:16px}
    .text-section .text1{grid-column:1/5;font-family:HelveticaNeueRegular,sans-serif;font-size:14px;line-height:1.1;color:rgba(3,3,3,0.5);margin-bottom:16px}
    .text-section .text2{grid-column:5/13;font-family:HelveticaNeueLight,Helvetica,Arial,sans-serif;font-size:28px;line-height:1.2;color:#030303}
    @media(max-width:1024px){.text-section{grid-template-columns:1fr}.text-section .text1,.text-section .text2{grid-column:1/2}}
    @media(max-width:768px){.text-section{padding:0 24px}.text-section .text2{font-size:22px}}

    /* === Project Cards === */
    .projectBlock{padding:0 48px;margin:160px 0}
    .projectBlock+.projectBlock{margin-top:27.7778vw}
    @media(min-width:1915px){.projectBlock+.projectBlock{margin-top:532px}}
    @media(max-width:432px){.projectBlock+.projectBlock{margin-top:120px}}
    .projectBlock .card{display:flex;align-items:center;cursor:pointer;padding:24px 0;border-top:1px solid rgba(3,3,3,0.03);gap:24px;opacity:0;transform:translateY(40px);animation:cardIn 1s ease forwards}
    .projectBlock .card:nth-child(1){animation-delay:0.1s}
    .projectBlock .card:nth-child(2){animation-delay:0.2s}
    @keyframes cardIn{to{opacity:1;transform:translateY(0)}}
    .projectBlock .card:hover{opacity:0.6}
    .projectBlock .thumb{width:80px;height:80px;border-radius:50%;overflow:hidden;flex-shrink:0;background:rgba(3,3,3,0.03)}
    .projectBlock .thumb img{width:100%;height:100%;object-fit:cover}
    .projectBlock .desc{flex:1;font-family:HelveticaNeueRegular,sans-serif;font-size:14px;line-height:1.5;color:rgba(3,3,3,0.6)}
    .projectBlock .arr{width:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:rgba(3,3,3,0.15);font-size:20px}
    @media(max-width:768px){.projectBlock{padding:0 24px;margin:80px 0}.projectBlock .card{padding:16px 0;gap:16px}.projectBlock .thumb{width:60px;height:60px}}

    /* === See All Projects === */
    .all-projects{padding:40px 48px 80px}
    .all-projects a{display:inline-flex;align-items:center;gap:6px;font-family:HelveticaNeueRegular,sans-serif;font-size:14px;line-height:1.1;color:#030303;cursor:pointer}
    .all-projects a:hover{opacity:0.5}
    .all-projects .count{color:rgba(3,3,3,0.3)}
    .all-projects .arrow{transition:transform 0.3s;font-size:12px}
    .all-projects a:hover .arrow{transform:translateX(4px)}
    @media(max-width:768px){.all-projects{padding:32px 24px 60px}}

    /* === Footer === */
    .footer{color:#e8e8e8;background:#030303;height:100dvh;position:relative;pointer-events:none;display:flex;flex-direction:column;justify-content:center;align-items:center}
    .footer>*{pointer-events:auto}
    .footer .cta{font-family:PSTimes,serif;font-size:3.0556vw;font-weight:400;line-height:1.1;position:absolute;top:23%;left:50%;transform:translateX(-50%);color:#e8e8e8;cursor:pointer;transition:opacity 0.5s}
    .footer .cta:hover{opacity:0.6}
    .footer .cta .after{font-family:PSTimes,serif;font-size:1.1111vw;margin-left:0.3em;position:absolute;top:10%}
    .footer .email{font-family:PSTimes,serif;font-size:3.0556vw;font-weight:400;position:absolute;top:46.75%;left:50%;transform:translate(-50%,-50%);text-align:center;line-height:1.2}
    .footer .email a{color:#e8e8e8;cursor:pointer;transition:opacity 0.5s}
    .footer .email a:hover{opacity:0.6}
    .footer .newsletter{position:absolute;bottom:40px;left:40px;font-family:HelveticaNeueRegular,sans-serif;font-size:14px}
    .footer .newsletter button{color:#e8e8e8;position:relative;padding-bottom:6px;font-size:14px;font-family:HelveticaNeueRegular,sans-serif}
    .footer .newsletter button span{border-bottom:1px solid #e8e8e8;padding-bottom:1px}
    .footer .networks{position:absolute;bottom:40px;right:48px;display:flex;gap:2.7778vw;font-family:HelveticaNeueRegular,sans-serif;font-size:14px}
    .footer .networks a{color:#e8e8e8;cursor:pointer;transition:opacity 0.5s}
    .footer .networks a:hover{opacity:0.6}
    .footer .address{position:absolute;bottom:5.5556vw;left:50%;transform:translateX(-50%);font-size:14px;font-family:HelveticaNeueRegular,sans-serif;opacity:0.3;color:#e8e8e8;text-align:center}
    @media(min-width:1915px){.footer .cta,.footer .email{font-size:58.52px}.footer .cta .after{font-size:21.28px}.footer .address{bottom:106.4px}}
    @media(max-width:1113px){.footer .cta,.footer .email{font-size:34px}.footer .cta .after{font-size:13px}}
    @media(max-width:785px){.footer .email{font-size:24px}}
    @media(max-width:768px){.footer .newsletter{bottom:32px;left:32px}.footer .networks{bottom:32px;right:32px}}

    /* === Project Detail Page === */
    .project-detail{background:#e8e8e8;min-height:100vh}
    .project-detail .back{position:fixed;top:48px;left:48px;z-index:20;font-family:HelveticaNeueRegular,sans-serif;font-size:14px;color:#030303;cursor:pointer;display:flex;align-items:center;gap:8px}
    .project-detail .back:hover{opacity:0.6}
    .project-detail .back .arrow{font-size:16px}
    .project-detail .title-wrap{padding:120px 48px 40px}
    .project-detail .title-wrap h1{font-family:PSTimes,serif;font-size:58.52px;font-weight:400;line-height:1.1;letter-spacing:-0.01em;color:#030303}
    .project-detail .specs{font-family:HelveticaNeueRegular,sans-serif;font-size:14px;color:rgba(3,3,3,0.5);margin-top:12px}
    .project-detail .project-buttons{display:flex;gap:24px;padding:0 48px 40px;font-family:HelveticaNeueRegular,sans-serif;font-size:14px}
    .project-detail .project-buttons a{color:#030303;cursor:pointer;position:relative;padding-bottom:6px;border-bottom:1px solid rgba(3,3,3,0.2)}
    .project-detail .project-buttons a:hover{opacity:0.6}
    .project-detail .media-block{padding:0 48px;margin:60px 0}
    .project-detail .media-block video,.project-detail .media-block img{width:100%;height:auto;border-radius:4px;background:rgba(3,3,3,0.02)}
    .project-detail .media-block .legend{font-family:HelveticaNeueRegular,sans-serif;font-size:14px;color:rgba(3,3,3,0.5);margin-top:16px;line-height:1.5}
    .project-detail .media-block .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:2px}
    .project-detail .media-block .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px}
    .project-detail .media-block .width-6{width:50%;margin:0 auto}
    .project-detail .media-block .width-8{width:66.666%}
    .project-detail .media-block .width-4{width:33.333%}
    @media(max-width:1113px){.project-detail .title-wrap h1{font-size:34px}.project-detail .title-wrap{padding:100px 24px 30px}.project-detail .media-block{padding:0 24px}.project-detail .project-buttons{padding:0 24px}.project-detail .back{top:24px;left:24px}}
    @media(max-width:768px){.project-detail .media-block .grid-2,.project-detail .media-block .grid-3{grid-template-columns:1fr}.project-detail .media-block .width-6,.project-detail .media-block .width-8,.project-detail .media-block .width-4{width:100%}}
  </style>
</head>

    function mediaHTML(m) {
      if (!m.url) return '';
      const wClass = m.w === 8 ? 'width-8' : m.w === 5 ? 'width-6' : m.w === 4 ? 'width-4' : '';
      const style = m.h ? ` style="max-height:${m.h}px;width:auto;margin:0 auto"` : '';
      if (m.type === 'video') {
        return `<video autoplay muted loop playsinline class="${wClass}"${style}>
          <source src="${m.url}" type="video/mp4">
        </video>`;
      }
      if (m.type === 'img') {
        return `<img src="${m.url}" class="${wClass}"${style} alt="">`;
      }
      return `<div class="${wClass}" style="background:rgba(3,3,3,0.02);border-radius:4px;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;color:rgba(3,3,3,0.15);font-size:12px">3D Model</div>`;
    }

    const medias = p.medias.map(m => {
      const blockClass = m.p ? '' : '';
      return `<div class="media-block ${m.p||''}">
        ${mediaHTML(m)}
        ${m.legend ? `<div class="legend">${m.legend}</div>` : ''}
      </div>`;
    }).join('');

    return `
    <div class="page project-detail" id="page-project">
      <div class="back" onclick="navigate('home')"><span class="arrow">←</span> Back to Home</div>
      <div class="title-wrap">
        <h1>${p.title}</h1>
        <div class="specs">${p.type} — ${p.specs}</div>
      </div>
      <div class="project-buttons">
        <a href="#">See backstage</a>
        <a href="#">Launch website</a>
        ${nextP ? `<a href="#" onclick="navigate('${nextP.slug}');return false">See next project →</a>` : ''}
      </div>
      ${medias}
      ${renderFooter()}
    </div>`;
  }

  // ============================================
  // ROUTER
  // ============================================
  let currentPage = 'home';

  function navigate(target) {
    const app = document.getElementById('app');
    if (target === 'home' || target === '' || target === null) {
      app.innerHTML = renderHome();
      currentPage = 'home';
      try { history.pushState({page:'home'}, '', '/'); } catch(e) {}
    } else {
      app.innerHTML = renderProject(target);
      currentPage = target;
      try { history.pushState({page:target}, '', '/' + target); } catch(e) {}
    }
    window.scrollTo(0,0);
    setupScroll();
  }

  function setupScroll() {
    const pages = document.querySelectorAll('.page');
    pages.forEach(p => {
      p.addEventListener('scroll', () => {
        const m = p.scrollHeight - p.clientHeight;
        tsp = m > 0 ? p.scrollTop / m : 0;
      });
    });
  }

  function initHomeAnimations() {
    const page = document.getElementById('page-home');
    if (page) {
      page.classList.remove('hidden');
      setupScroll();
    }
  }

  // ============================================
  // AUDIO ENGINE
  // ============================================
  class AudioEngine {
    constructor(){this.ctx=null;this.playing=false;this.muted=true;this.nodes=[];this.analyser=null;this.freqData=null;this.gain=null;}
    async init(){
      if(this.ctx)return;
      this.ctx=new AudioContext();
      this.analyser=this.ctx.createAnalyser();this.analyser.fftSize=64;this.analyser.smoothingTimeConstant=0.85;
      this.freqData=new Uint8Array(this.analyser.frequencyBinCount);
      this.gain=this.ctx.createGain();this.gain.gain.value=0;
      this.gain.connect(this.analyser);this.analyser.connect(this.ctx.destination);
      [55,65.41,82.41,110].forEach(f=>{const o=this.ctx.createOscillator();o.type='sawtooth';o.frequency.value=f;o.detune.value=(Math.random()-0.5)*15;const g=this.ctx.createGain();g.gain.value=0.045;const l=this.ctx.createOscillator();l.type='sine';l.frequency.value=0.04+Math.random()*0.06;const lg=this.ctx.createGain();lg.gain.value=0.04;l.connect(lg);lg.connect(g.gain);o.connect(g);g.connect(this.gain);o.start();l.start();});
      const b=this.ctx.createOscillator();b.type='sine';b.frequency.value=36.71;const bg=this.ctx.createGain();bg.gain.value=0.06;const bl=this.ctx.createOscillator();bl.type='sine';bl.frequency.value=0.15;const blg=this.ctx.createGain();blg.gain.value=0.05;bl.connect(blg);blg.connect(bg.gain);b.connect(bg);bg.connect(this.gain);b.start();bl.start();
      const an=[261.63,311.13,392,466.16,523.25,392,349.23,293.66];let si=0;const ao=this.ctx.createOscillator();ao.type='sine';const ag=this.ctx.createGain();ag.gain.value=0;const af=this.ctx.createBiquadFilter();af.type='lowpass';af.frequency.value=2000;af.Q.value=2;ao.connect(ag);ag.connect(af);af.connect(this.gain);ao.start();let nt=this.ctx.currentTime;const sa=()=>{if(!this.playing)return;const nw=this.ctx.currentTime;while(nt<nw+0.1){const note=an[si%an.length],ng=0.015+Math.random()*0.01,dur=0.2+Math.random()*0.3;ag.gain.setValueAtTime(ng,nt);ag.gain.exponentialRampToValueAtTime(0.001,nt+dur);ao.frequency.setValueAtTime(note,nt);af.frequency.setValueAtTime(600+Math.random()*2000,nt);si++;nt+=0.25+Math.random()*0.15;}};sa();
      const buf=this.ctx.createBuffer(1,4*this.ctx.sampleRate,this.ctx.sampleRate);const d=buf.getChannelData(0);let last=0;for(let i=0;i<d.length;i++){d[i]=(Math.random()*2-1)*0.008;d[i]+=last*0.99;last=d[i];}const ns=this.ctx.createBufferSource();ns.buffer=buf;ns.loop=true;const ng=this.ctx.createGain();ng.gain.value=0.008;const nf=this.ctx.createBiquadFilter();nf.type='lowpass';nf.frequency.value=120;ns.connect(nf);nf.connect(ng);ng.connect(this.gain);ns.start();
    }
    start(){if(this.playing)return;if(this.ctx?.state==='suspended')this.ctx.resume();this.playing=true;}
    toggle(){this.muted=!this.muted;if(this.gain)this.gain.gain.value=this.muted?0:0.2;return!this.muted;}
    level(){if(!this.analyser)return 0;this.analyser.getByteFrequencyData(this.freqData);let s=0;for(let i=0;i<this.freqData.length;i++)s+=this.freqData[i];return s/this.freqData.length/255*2;}
  }

  // ============================================
  // WEBGL SHADER BACKGROUND  
  // ============================================
  (function initWebGL(){
    const canvas=document.getElementById('webgl-canvas');
    if(!canvas)return;
    const gl=canvas.getContext('webgl')||canvas.getContext('experimental-webgl');
    if(!gl)return;
    
    function resize(){
      canvas.width=window.innerWidth*devicePixelRatio;
      canvas.height=window.innerHeight*devicePixelRatio;
      canvas.style.width=window.innerWidth+'px';
      canvas.style.height=window.innerHeight+'px';
      gl.viewport(0,0,gl.drawingBufferWidth,gl.drawingBufferHeight);
    }
    window.addEventListener('resize',resize);
    resize();

    const vs='attribute vec2 p;void main(){gl_Position=vec4(p,0.0,1.0);}';
    const fs='precision highp float;uniform vec2 r;uniform float t;uniform vec2 m;uniform float s;uniform float a;mat2 rot(float x){float c=cos(x),si=sin(x);return mat2(c,-si,si,c);}float fbm(vec2 p){float v=0.0,amp=0.5;vec2 sh=vec2(100.0);for(int i=0;i<5;i++){p=rot(0.5+t*0.02)*p;v+=amp*sin(p.x*1.5+p.y*1.2+t*0.06);p=p*2.0+sh;amp*=0.5;}return v;}float org(vec2 p){float tm=t*0.03;return(sin(p.x*2.0+p.y*1.7+tm)*0.5+sin(p.x*3.5-p.y*2.3+tm*0.7)*0.25+sin(p.x*5.2+p.y*4.1+tm*0.5)*0.125+sin(p.x*8.0-p.y*7.0+tm*0.3)*0.0625)*0.5+0.5;}void main(){vec2 uv=gl_FragCoord.xy/r.xy;vec2 p=(gl_FragCoord.xy-0.5*r.xy)/r.y;p+=(m-0.5)*0.15;float sc=s*0.1,au=a*0.1;float v1=org(p*1.5+vec2(sc,sc*0.05));float v2=fbm(p*2.0+vec2(sc*0.1,-sc*0.05));float v3=org(p*3.0+vec2(t*0.015,t*0.01));float mv=mix(v1,v2,0.4+au)*0.8+v3*0.2;float vig=1.0-length(uv-0.5)*0.6;vig=smoothstep(0.3,0.8,vig);float base=0.92-mv*0.12-au*0.03;vec3 col=vec3(base+0.01,base+0.005,base+0.02)*vig;float g=(fract(sin(dot(gl_FragCoord.xy,vec2(12.9898,78.233)))*43758.5453)-0.5)*0.008;gl_FragColor=vec4(col+g,1.0);}';

    function compile(src,type){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));return null;}return s;}
    const prog=gl.createProgram();
    gl.attachShader(prog,compile(vs,gl.VERTEX_SHADER));
    gl.attachShader(prog,compile(fs,gl.FRAGMENT_SHADER));
    gl.linkProgram(prog);
    if(!gl.getProgramParameter(prog,gl.LINK_STATUS)){console.error(gl.getProgramInfoLog(prog));return;}
    gl.useProgram(prog);

    const data=new Float32Array([-1,-1,3,-1,-1,3]);
    const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,data,gl.STATIC_DRAW);
    const ploc=gl.getAttribLocation(prog,'p');gl.enableVertexAttribArray(ploc);gl.vertexAttribPointer(ploc,2,gl.FLOAT,false,0,0);
    const uloc={r:gl.getUniformLocation(prog,'r'),t:gl.getUniformLocation(prog,'t'),m:gl.getUniformLocation(prog,'m'),s:gl.getUniformLocation(prog,'s'),a:gl.getUniformLocation(prog,'a')};

    let mx=0.5,my=0.5,sp=0,tsp=0,time=0,last=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX/window.innerWidth;my=1-e.clientY/window.innerHeight;});

    function animate(now){
      const dt=Math.min((now-last)/1000,0.05);last=now;time+=dt;
      sp+=(tsp-sp)*0.05;
      gl.uniform2f(uloc.r,canvas.width,canvas.height);
      gl.uniform1f(uloc.t,time);
      gl.uniform2f(uloc.m,mx,my);
      gl.uniform1f(uloc.s,sp);
      gl.uniform1f(uloc.a,audioEngine&&audioEngine.playing&&!audioEngine.muted?audioEngine.level():0);
      gl.drawArrays(gl.TRIANGLES,0,3);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    // Expose scroll control
    window.__setScroll = v => tsp = v;
    // Hook scroll on pages
    document.addEventListener('scroll',()=>{},true);
    // Observe new pages
    const obs=new MutationObserver(()=>{
      const pages=document.querySelectorAll('.page');
      pages.forEach(p=>{
        if(!p._scrollHooked){
          p._scrollHooked=true;
          p.addEventListener('scroll',()=>{
            const m=p.scrollHeight-p.clientHeight;
            tsp=m>0?p.scrollTop/m:0;
          });
        }
      });
    });
    obs.observe(document.getElementById('app'),{childList:true,subtree:true});
  })();

  // ============================================
  // INIT
  // ============================================
  const audioEngine = new AudioEngine();
  let audioReady = false;

  document.getElementById('soundToggle').addEventListener('click', async function() {
    if (!audioReady) {
      await audioEngine.init();
      audioEngine.start();
      audioReady = true;
      audioEngine.toggle();
      this.classList.remove('sound--muted');
      this.classList.add('sound--playing');
    } else {
      const on = audioEngine.toggle();
      if (on) {
        this.classList.remove('sound--muted');
        this.classList.add('sound--playing');
      } else {
        this.classList.add('sound--muted');
        this.classList.remove('sound--playing');
      }
    }
  });

  document.addEventListener('click', () => {
    if (!audioReady) {
      document.getElementById('soundToggle').click();
    }
  }, { once: true });

  // Intro loader
  setTimeout(() => {
    const il = document.getElementById('introLoader');
    if (il) il.classList.add('hidden');
    setTimeout(() => { if (il) il.style.display = 'none'; }, 1500);
  }, 3200);

  // Sound ring animation
  const ring = document.getElementById('soundRing');
  if (ring) {
    let on = false;
    setInterval(() => {
      const st = document.getElementById('soundToggle');
      if (!audioReady || audioEngine.muted) {
        ring.style.strokeDashoffset = '81.68';
        ring.style.opacity = '0.3';
        return;
      }
      on = !on;
      ring.style.strokeDashoffset = on ? '0' : '81.68';
      ring.style.opacity = '1';
    }, 1200);
  }

  // Route handling
  function routeFromPath() {
    const path = window.location.pathname.replace(/\/$/,'');
    if (path === '' || path === '/' || path === '/index.html') return 'home';
    const slug = path.replace(/^\//,'');
    const found = PROJECTS.find(p => p.slug === slug);
    return found ? slug : 'home';
  }

  window.addEventListener('popstate', () => {
    navigate(routeFromPath());
  });

  // Render initial page
  navigate(routeFromPath());

  console.log('🌱 Immersive Garden clone loaded');
  console.log('📦', PROJECTS.length, 'projects available');
  </script>
