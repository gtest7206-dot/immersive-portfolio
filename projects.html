// ===== WEBGL =====
(function(){
  var c=document.getElementById('webgl-canvas');
  var gl=c.getContext('webgl')||c.getContext('experimental-webgl');
  if(!gl)return;
  function resize(){
    c.width=window.innerWidth*(window.devicePixelRatio||1);
    c.height=window.innerHeight*(window.devicePixelRatio||1);
    c.style.width=window.innerWidth+'px';c.style.height=window.innerHeight+'px';
    gl.viewport(0,0,gl.drawingBufferWidth,gl.drawingBufferHeight);
  }
  window.addEventListener('resize',resize);resize();
  var vs='attribute vec2 a;varying vec2 v;void main(){v=a;gl_Position=vec4(a,0,1);}';
  var fs='precision highp float;uniform float t;uniform vec2 r;varying vec2 v;void main(){vec2 u=gl_FragCoord.xy/r;float s=sin(u.x*3.0+t*0.03)*0.03+cos(u.y*2.0+t*0.02)*0.02;s+=sin((u.x+u.y)*5.0+t*0.04)*0.01;float b=0.91+s;gl_FragColor=vec4(b*0.012,b*0.012,b*0.012,1);}';
  var p=gl.createProgram();
  function addShader(t,s){var sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);gl.attachShader(p,sh);}
  addShader(gl.VERTEX_SHADER,vs);addShader(gl.FRAGMENT_SHADER,fs);gl.linkProgram(p);
  var buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  var loc=gl.getAttribLocation(p,'a');gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);gl.useProgram(p);
  function draw(time){
    gl.uniform1f(gl.getUniformLocation(p,'t'),time*0.001);
    gl.uniform2f(gl.getUniformLocation(p,'r'),c.width,c.height);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    requestAnimationFrame(draw);
  }
  draw(0);
})();
